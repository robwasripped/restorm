name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dev container image
        run: docker build -f .devcontainer/Dockerfile -t restorm-dev .

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php8.4-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php8.4-composer-

      - name: Install dependencies
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            restorm-dev \
            composer install --prefer-dist --no-progress --no-interaction

      - name: Upload vendor
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Run PHPUnit
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            restorm-dev \
            ./vendor/bin/phpunit --log-junit phpunit-report.xml

      - name: Annotate test failures
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: phpunit-report.xml
          check_name: PHPUnit

  mago:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: lint
          - name: Analyse
            command: analyze

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: ${{ matrix.name }}
        id: mago
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            restorm-dev \
            mago ${{ matrix.command }}
        continue-on-error: true

      - name: ${{ matrix.name }} summary
        if: steps.mago.outcome == 'failure'
        run: |
          echo "## Mago ${{ matrix.name }} issues" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            restorm-dev \
            mago ${{ matrix.command }} --reporting-format=medium >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on issues
        if: steps.mago.outcome == 'failure'
        run: exit 1
