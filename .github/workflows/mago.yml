name: Mago

on:
  pull_request:

jobs:
  mago:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: lint
          - name: Analyse
            command: analyze

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dev container image
        run: docker build -f .devcontainer/Dockerfile -t restorm-dev .

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php8.4-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php8.4-composer-

      - name: Install dependencies
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            restorm-dev \
            composer install --prefer-dist --no-progress --no-interaction

      - name: ${{ matrix.name }}
        id: mago
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            restorm-dev \
            mago ${{ matrix.command }}
        continue-on-error: true

      - name: ${{ matrix.name }} summary
        if: steps.mago.outcome == 'failure'
        run: |
          echo "## Mago ${{ matrix.name }} issues" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            restorm-dev \
            mago ${{ matrix.command }} --reporting-format=medium >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on issues
        if: steps.mago.outcome == 'failure'
        run: exit 1
